server {
    listen 80;
    listen [::]:80;
    server_name alpha.kenfinly.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alpha.kenfinly.com;

    root /Users/dieter/Projects/kenfinly/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 25m;
    server_tokens off;

    ssl_certificate /opt/homebrew/etc/nginx/ssl/alpha.kenfinly.com.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/alpha.kenfinly.com.key;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/opt/homebrew/var/run/php-fpm-alpha-8.2.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /(?:\.env|composer\.(?:json|lock)|package(?:-lock)?\.json|vite\.config\.js|artisan) {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}