server {
    listen 80;
    listen [::]:80;
    server_name staging.kenfinly.com;

    root /var/www/kenfinly/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 25m;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    access_log /var/log/nginx/kenfinly-staging.access.log;
    error_log /var/log/nginx/kenfinly-staging.error.log warn;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/kenfinly/public;
    }

    location /wordpress/ {
        try_files $uri $uri/ /wordpress/index.php?$args;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(?:composer\.(?:json|lock)|package(?:-lock)?\.json|vite\.config\.js|artisan|\.env) {
        deny all;
    }
}
