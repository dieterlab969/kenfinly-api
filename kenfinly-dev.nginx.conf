server {
    listen 80;
    listen [::]:80;
    server_name dev.kenfinly.com dev.wp.kenfinly.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.kenfinly.com;

    root /var/www/kenfinly/api/public;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 25m;
    server_tokens off;

    ssl_certificate /etc/ssl/certs/kenfinly-dev.crt;
    ssl_certificate_key /etc/ssl/private/kenfinly-dev.key;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/kenfinly-dev.access.log;
    error_log /var/log/nginx/kenfinly-dev.error.log warn;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /(?:\.env|composer\.(?:json|lock)|package(?:-lock)?\.json|vite\.config\.js|artisan) { deny all; }
    location ~ /\.(?!well-known).* { deny all; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.wp.kenfinly.com;

    root /var/www/kenfinly/api/public/wordpress;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 64m;
    server_tokens off;

    ssl_certificate /etc/ssl/certs/kenfinly-dev.crt;
    ssl_certificate_key /etc/ssl/private/kenfinly-dev.key;

    access_log /var/log/nginx/kenfinly-wp-dev.access.log;
    error_log /var/log/nginx/kenfinly-wp-dev.error.log warn;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /(?:wp-config\.php|\.env|composer\.(?:json|lock)|package(?:-lock)?\.json) { deny all; }
    location ~ /\.(?!well-known).* { deny all; }
}
