<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3B5BDB" />
  <title>Kenfinly – You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #3B5BDB;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 48px; height: 48px; color: white; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #64748b; font-size: 1rem; line-height: 1.6; max-width: 360px; margin: 0 auto 2rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #fee2e2; color: #dc2626; border-radius: 9999px;
      padding: 0.35rem 1rem; font-size: 0.875rem; font-weight: 600; margin-bottom: 1.5rem;
    }
    .badge svg { width: 16px; height: 16px; }
    button {
      background: #3B5BDB; color: white; border: none; border-radius: 12px;
      padding: 0.875rem 2rem; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .tip { margin-top: 2rem; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="white"/></svg>
  </div>

  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    No Internet Connection
  </div>

  <h1>You're Offline</h1>
  <p>
    Kenfinly can't connect to the server right now. Check your internet connection and try again.
  </p>

  <button onclick="window.location.reload()">Try Again</button>

  <p class="tip">Your data is safe — it will sync when you're back online.</p>
</body>
</html>
